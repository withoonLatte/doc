<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดการเอกสารขาย (React SPA)</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Kanit', sans-serif; }

        .sidebar-bg { 
            background-color: #064e3b; 
            background-image: url('bg.jpg'); 
            background-size: cover; 
            background-position: center; 
            position: relative;
        }

        @media print {
            body * { visibility: hidden; background: #fff !important; }
            #print-modal, #print-modal * { visibility: visible; }
            #print-section { 
                position: absolute !important; 
                left: 0 !important; 
                top: 0 !important; 
                width: 210mm !important; 
                height: 297mm !important;
                margin: 0 !important; 
                padding: 15mm !important; 
                box-shadow: none !important;
                page-break-after: avoid !important;
                transform: scale(1) !important;
            }
            @page { size: A4 portrait; margin: 0mm; }
            .no-print { display: none !important; }
        }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">

    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, doc, setDoc, getDocs, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const { useState, useEffect, useMemo } = React;

        // --- Firebase Configuration ---
        const firebaseConfig = {
            apiKey: "AIzaSyD5PoZ4QcAo7mBspIscnsO6cnUxGPyY7iQ",
            authDomain: "cdz-doc.firebaseapp.com",
            projectId: "cdz-doc",
            storageBucket: "cdz-doc.firebasestorage.app",
            messagingSenderId: "236255831921",
            appId: "1:236255831921:web:48076c3fdc410b653d78d0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const publicPath = `artifacts/${firebaseConfig.projectId}/public/data`;

        // --- Utils ---
        const formatNum = (num) => Number(num || 0).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        const formatDate = (dateStr) => {
            if (!dateStr) return '';
            const parts = dateStr.split('-');
            if (parts.length >= 3) return `${parts[2].substring(0, 2)}/${parts[1]}/${parts[0]}`;
            return dateStr;
        };

        // ==========================================
        // 1. MAIN APP COMPONENT
        // ==========================================
        function App() {
            const [user, setUser] = useState(null);
            const [authLoading, setAuthLoading] = useState(true);

            useEffect(() => {
                const savedUser = localStorage.getItem('cdz_doc_user');
                if (savedUser) setUser(JSON.parse(savedUser));
                setAuthLoading(false);
            }, []);

            const handleLogin = (userData) => {
                localStorage.setItem('cdz_doc_user', JSON.stringify(userData));
                setUser(userData);
            };

            const handleLogout = () => {
                localStorage.removeItem('cdz_doc_user');
                setUser(null);
            };

            if (authLoading) {
                return (
                    <div className="flex h-screen items-center justify-center bg-slate-50">
                        <p className="text-emerald-600 text-lg font-bold"><i className="fas fa-circle-notch fa-spin mr-2"></i>กำลังโหลดระบบ...</p>
                    </div>
                );
            }

            return user ? <MainDashboard user={user} onLogout={handleLogout} /> : <AuthScreen onLogin={handleLogin} />;
        }

        // ==========================================
        // 2. AUTH SCREEN
        // ==========================================
        function AuthScreen({ onLogin }) {
            const [isSetup, setIsSetup] = useState(false);
            const [loading, setLoading] = useState(true);
            const [name, setName] = useState('');
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');

            useEffect(() => {
                const checkDb = async () => {
                    try {
                        const snap = await getDocs(collection(db, publicPath, 'employees'));
                        setIsSetup(snap.empty);
                    } catch (err) {
                        setError('ไม่สามารถเชื่อมต่อฐานข้อมูลได้ กรุณาตรวจสอบ Rules ใน Firestore');
                    }
                    setLoading(false);
                };
                checkDb();
            }, []);

            const handleSubmit = async (e) => {
                e.preventDefault();
                setError('');
                setLoading(true);
                
                try {
                    const snap = await getDocs(collection(db, publicPath, 'employees'));
                    
                    if (isSetup) {
                        if (snap.docs.some(d => d.data().email === email)) {
                            setError('อีเมลนี้มีอยู่ในระบบแล้ว');
                            setLoading(false); return;
                        }
                        const newId = 'E' + Date.now().toString().slice(-6);
                        const userData = { id: newId, name: name || 'Admin', email, password, role: 'admin', createdAt: new Date().toISOString() };
                        await setDoc(doc(db, publicPath, 'employees', newId), userData);
                        onLogin(userData);
                    } else {
                        const userDoc = snap.docs.find(d => d.data().email === email && d.data().password === password);
                        if (userDoc) {
                            onLogin({ id: userDoc.id, ...userDoc.data() });
                        } else {
                            setError('อีเมลหรือรหัสผ่านไม่ถูกต้อง');
                        }
                    }
                } catch (err) {
                    setError('เกิดข้อผิดพลาด กรุณาลองใหม่');
                }
                setLoading(false);
            };

            if (loading) {
                return <div className="flex h-screen items-center justify-center bg-slate-100"><span className="text-emerald-600 font-bold"><i className="fas fa-circle-notch fa-spin mr-2"></i>กำลังตรวจสอบระบบ...</span></div>;
            }

            return (
                <div className="min-h-screen flex items-center justify-center bg-slate-100 p-4">
                    <div className="bg-white rounded-2xl shadow-xl w-full max-w-md overflow-hidden border border-slate-200">
                        <div className="bg-emerald-600 p-6 text-center text-white">
                            <i className="fas fa-file-invoice-dollar text-4xl mb-2"></i>
                            <h2 className="text-2xl font-bold">{isSetup ? 'สร้างบัญชีผู้ดูแลระบบ (Admin)' : 'เข้าสู่ระบบ'}</h2>
                            <p className="text-emerald-100 text-sm mt-1">ระบบจัดการเอกสารขาย</p>
                        </div>
                        <form onSubmit={handleSubmit} className="p-6 sm:p-8 space-y-5">
                            {error && <div className="bg-red-50 text-red-600 p-3 rounded text-sm text-center border border-red-200"><i className="fas fa-exclamation-triangle mr-2"></i>{error}</div>}
                            
                            {isSetup && (
                                <div>
                                    <label className="block text-sm font-medium text-slate-700 mb-1">ชื่อผู้ใช้</label>
                                    <div className="relative">
                                        <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><i className="fas fa-user text-slate-400"></i></div>
                                        <input type="text" value={name} onChange={e => setName(e.target.value)} className="w-full pl-10 p-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-emerald-400 outline-none" required placeholder="ชื่อ-นามสกุล" />
                                    </div>
                                </div>
                            )}
                            <div>
                                <label className="block text-sm font-medium text-slate-700 mb-1">อีเมล</label>
                                <div className="relative">
                                    <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><i className="fas fa-envelope text-slate-400"></i></div>
                                    <input type="email" value={email} onChange={e => setEmail(e.target.value)} className="w-full pl-10 p-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-emerald-400 outline-none" required placeholder="name@example.com" />
                                </div>
                            </div>
                            <div>
                                <label className="block text-sm font-medium text-slate-700 mb-1">รหัสผ่าน</label>
                                <div className="relative">
                                    <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><i className="fas fa-lock text-slate-400"></i></div>
                                    <input type="password" value={password} onChange={e => setPassword(e.target.value)} className="w-full pl-10 p-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-emerald-400 outline-none" required placeholder="••••••••" />
                                </div>
                            </div>
                            <button type="submit" disabled={loading} className="w-full bg-emerald-600 text-white font-bold rounded-lg px-4 py-3 hover:bg-emerald-700 transition shadow-md disabled:opacity-50 flex items-center justify-center">
                                {loading ? <i className="fas fa-circle-notch fa-spin"></i> : (isSetup ? 'สร้างบัญชี Admin' : 'เข้าสู่ระบบ')}
                            </button>
                            
                            <div className="text-center mt-4 pt-4 border-t border-slate-100">
                                <button type="button" onClick={() => setIsSetup(!isSetup)} className="text-xs text-slate-400 hover:text-emerald-600 transition-colors font-medium">
                                    {isSetup ? <><i className="fas fa-sign-in-alt mr-1"></i> มีบัญชีแล้ว? เข้าสู่ระบบ</> : <><i className="fas fa-cog mr-1"></i> สำหรับการใช้งานครั้งแรก (สร้าง Admin)</>}
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            );
        }

        // ==========================================
        // 3. MAIN DASHBOARD & REALTIME DATA
        // ==========================================
        function MainDashboard({ user, onLogout }) {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [isSidebarCollapsed, setSidebarCollapsed] = useState(window.innerWidth < 768);
            const [isMobileMenuOpen, setMobileMenuOpen] = useState(false);

            const [company, setCompany] = useState({});
            const [customers, setCustomers] = useState([]);
            const [products, setProducts] = useState([]);
            const [documents, setDocuments] = useState([]);
            const [employees, setEmployees] = useState([]);
            const [dataLoaded, setDataLoaded] = useState(false);

            const currentUserRecord = employees.find(e => e.id === user.id);
            const userRole = currentUserRecord ? currentUserRecord.role : user.role;

            const [printDoc, setPrintDoc] = useState(null);

            useEffect(() => {
                const handleResize = () => { if (window.innerWidth < 768) setSidebarCollapsed(true); };
                window.addEventListener('resize', handleResize);
                return () => window.removeEventListener('resize', handleResize);
            }, []);

            useEffect(() => {
                const unsubSettings = onSnapshot(doc(db, publicPath, 'settings', 'profile'), doc => setCompany(doc.exists() ? doc.data() : {}));
                const unsubCust = onSnapshot(collection(db, publicPath, 'customers'), snap => setCustomers(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
                const unsubProd = onSnapshot(collection(db, publicPath, 'products'), snap => setProducts(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
                const unsubDocs = onSnapshot(collection(db, publicPath, 'documents'), snap => setDocuments(snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => b.id.localeCompare(a.id))));
                const unsubEmp = onSnapshot(collection(db, publicPath, 'employees'), snap => {
                    const emps = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    setEmployees(emps);
                    if (dataLoaded && !emps.find(e => e.id === user.id)) {
                        Swal.fire('ข้อผิดพลาด', 'บัญชีของคุณถูกระงับ', 'error').then(onLogout);
                    }
                });

                setDataLoaded(true);
                return () => { unsubSettings(); unsubCust(); unsubProd(); unsubDocs(); unsubEmp(); };
            }, [user.id]);

            const confirmLogout = () => {
                Swal.fire({
                    title: 'ยืนยันการออกจากระบบ?', icon: 'question', showCancelButton: true,
                    confirmButtonColor: '#059669', cancelButtonColor: '#94a3b8',
                    confirmButtonText: 'ออกจากระบบ', cancelButtonText: 'ยกเลิก'
                }).then((r) => { if (r.isConfirmed) onLogout(); });
            };

            const changeTab = (tabId) => {
                setActiveTab(tabId);
                setMobileMenuOpen(false);
                if (window.innerWidth < 768) setSidebarCollapsed(true);
            };

            const renderContent = () => {
                if (!dataLoaded) return <div className="p-8 text-center text-slate-500"><i className="fas fa-circle-notch fa-spin mr-2"></i>กำลังโหลดข้อมูล...</div>;
                
                switch (activeTab) {
                    case 'dashboard': return <DashboardView documents={documents} customers={customers} changeTab={changeTab} />;
                    case 'documents': return <DocumentsView documents={documents} customers={customers} products={products} onPrint={setPrintDoc} />;
                    case 'old_documents': return <OldDocumentsView documents={documents} customers={customers} onPrint={setPrintDoc} />;
                    case 'customers': return <CustomersView customers={customers} />;
                    case 'products': return <ProductsView products={products} />;
                    case 'employees': return userRole === 'admin' ? <EmployeesView employees={employees} currentUser={user} /> : <div className="p-8 text-center text-red-500 font-bold"><i className="fas fa-lock mr-2"></i>ไม่มีสิทธิ์เข้าถึงหน้านี้</div>;
                    case 'settings': return <SettingsView company={company} />;
                    default: return <DashboardView documents={documents} customers={customers} changeTab={changeTab} />;
                }
            };

            const navItems = [
                { id: 'dashboard', label: 'แดชบอร์ด', icon: 'fa-chart-line' },
                { id: 'documents', label: 'เอกสารขาย', icon: 'fa-file-invoice-dollar' },
                { id: 'old_documents', label: 'เอกสารเก่า', icon: 'fa-folder-open' },
                { id: 'customers', label: 'ลูกค้า', icon: 'fa-users' },
                { id: 'products', label: 'สินค้า', icon: 'fa-box' },
                { id: 'settings', label: 'ตั้งค่า', icon: 'fa-cog' },
            ];

            return (
                <div className="flex h-screen overflow-hidden bg-slate-50 font-sans relative">
                    {/* Mobile Menu Overlay */}
                    {isMobileMenuOpen && <div className="fixed inset-0 bg-slate-900/60 z-40 md:hidden backdrop-blur-sm" onClick={() => setMobileMenuOpen(false)} />}

                    {/* Sidebar */}
                    <aside className={`sidebar-bg fixed md:relative z-50 h-full flex flex-col transition-all duration-300 shadow-2xl border-r border-slate-800
                        ${isMobileMenuOpen ? 'translate-x-0' : '-translate-x-full md:translate-x-0'}
                        ${isSidebarCollapsed ? 'md:w-20' : 'w-64'}
                    `}>
                        <div className="absolute inset-0 bg-slate-900/85 z-0"></div>
                        <div className="relative z-10 flex flex-col h-full">
                            <div className={`p-4 flex items-center border-b border-white/20 h-16 shrink-0 overflow-hidden ${isSidebarCollapsed ? 'justify-center' : ''}`}>
                                <div className="w-10 h-10 shrink-0 bg-white rounded-lg flex items-center justify-center text-emerald-800 font-bold text-xl shadow-md">S</div>
                                {!isSidebarCollapsed && <span className="ml-3 text-xl font-bold text-white tracking-wide truncate drop-shadow-md">Sales Doc</span>}
                            </div>
                            
                            <nav className="flex-1 py-6 overflow-y-auto px-3 space-y-1.5">
                                {navItems.map(item => (
                                    <button key={item.id} onClick={() => changeTab(item.id)} title={isSidebarCollapsed ? item.label : ''} className={`w-full flex items-center py-3 rounded-xl transition-all duration-200 ${isSidebarCollapsed ? 'justify-center px-0' : 'px-4'} ${activeTab === item.id ? 'bg-white/25 text-white font-bold shadow-md border border-white/20 backdrop-blur-sm' : 'text-white/80 hover:bg-white/15 hover:text-white font-medium'}`}>
                                        <i className={`fas ${item.icon} text-lg w-6 text-center shrink-0`}></i>
                                        {!isSidebarCollapsed && <span className="ml-3 truncate">{item.label}</span>}
                                    </button>
                                ))}
                                {userRole === 'admin' && (
                                    <button onClick={() => changeTab('employees')} title={isSidebarCollapsed ? 'พนักงาน' : ''} className={`w-full flex items-center py-3 rounded-xl transition-all duration-200 mt-2 border border-transparent hover:border-emerald-500/30 text-emerald-400 font-bold ${isSidebarCollapsed ? 'justify-center px-0' : 'px-4'} ${activeTab === 'employees' ? 'bg-emerald-900/50 border-emerald-500/50 text-emerald-300' : 'hover:bg-white/10'}`}>
                                        <i className="fas fa-user-shield text-lg w-6 text-center shrink-0"></i>
                                        {!isSidebarCollapsed && <span className="ml-3 truncate">พนักงาน</span>}
                                    </button>
                                )}
                            </nav>
                            
                            <div className="p-3 border-t border-white/20 hidden md:block">
                                <button onClick={() => setSidebarCollapsed(!isSidebarCollapsed)} className="w-full flex items-center justify-center py-2 text-white/50 hover:text-white hover:bg-white/10 rounded-lg transition-colors">
                                    <i className={`fas ${isSidebarCollapsed ? 'fa-chevron-right' : 'fa-chevron-left'}`}></i>
                                </button>
                            </div>
                        </div>
                    </aside>

                    {/* Main Workspace */}
                    <main className={`flex-1 flex flex-col h-full overflow-hidden transition-all duration-300 ${printDoc ? 'hidden' : ''}`}>
                        <header className="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-4 sm:px-6 shrink-0 z-10 shadow-sm">
                            <div className="flex items-center">
                                <button onClick={() => setMobileMenuOpen(true)} className="p-2 mr-3 text-slate-500 hover:bg-slate-100 rounded-md md:hidden transition-colors">
                                    <i className="fas fa-bars text-lg"></i>
                                </button>
                                <h1 className="text-lg sm:text-xl font-bold text-slate-800 truncate">
                                    {activeTab === 'dashboard' ? 'ภาพรวมระบบ' : activeTab === 'documents' ? 'จัดการเอกสารขาย' : activeTab === 'old_documents' ? 'เอกสารเก่า (Archive)' : activeTab === 'customers' ? 'ฐานข้อมูลลูกค้า' : activeTab === 'products' ? 'จัดการสินค้าและบริการ' : activeTab === 'settings' ? 'ตั้งค่าระบบ' : 'พนักงาน'}
                                </h1>
                            </div>
                            <div className="flex items-center space-x-4">
                                <div className="flex flex-col text-right hidden sm:flex">
                                    <span className="text-sm font-bold text-slate-700 truncate max-w-[150px]">{company.name || 'ตั้งค่าบริษัท'}</span>
                                    <span className="text-xs text-emerald-600 font-medium">{user.name} ({userRole})</span>
                                </div>
                                <button onClick={confirmLogout} title="ออกจากระบบ" className="p-2 text-slate-500 hover:text-red-600 hover:bg-red-50 rounded-md transition-colors flex items-center space-x-2 border border-transparent hover:border-red-200">
                                    <i className="fas fa-sign-out-alt"></i> <span className="text-sm font-bold hidden sm:block">ออก</span>
                                </button>
                            </div>
                        </header>

                        <div className="flex-1 overflow-y-auto p-4 sm:p-6 relative">
                            {renderContent()}
                        </div>
                    </main>

                    {printDoc && <PrintView doc={printDoc} company={company} customer={customers.find(c => c.id === printDoc.customerId) || {}} onClose={() => setPrintDoc(null)} />}
                </div>
            );
        }

        // ==========================================
        // SUB-VIEWS
        // ==========================================

        function DashboardView({ documents, customers, changeTab }) {
            const [selectedMonth, setSelectedMonth] = useState(new Date().toISOString().slice(0, 7));

            const stats = useMemo(() => {
                const monthDocs = documents.filter(d => d.date.startsWith(selectedMonth));
                const reDocs = monthDocs.filter(d => d.type === 'RE');
                const ivDocs = monthDocs.filter(d => d.type === 'IV');
                return {
                    totalSales: reDocs.reduce((s, d) => s + d.grandTotal, 0),
                    receiptsCount: reDocs.length,
                    pendingAmount: ivDocs.filter(d => d.status === 'Unpaid').reduce((s, d) => s + d.grandTotal, 0),
                    invoicesCount: ivDocs.length,
                    salesData: reDocs
                };
            }, [documents, selectedMonth]);

            return (
                <div className="space-y-6">
                    <div className="bg-gradient-to-r from-emerald-600 to-green-500 rounded-2xl shadow-lg p-5 sm:p-6 text-white flex flex-col md:flex-row justify-between items-center gap-4 relative overflow-hidden">
                        <i className="fas fa-file-invoice-dollar absolute right-0 top-0 opacity-10 text-[120px] sm:text-[150px] -translate-y-8 translate-x-8"></i>
                        <div className="relative z-10 text-center md:text-left">
                            <h2 className="text-xl sm:text-2xl font-bold mb-1">ยินดีต้อนรับสู่ระบบจัดการเอกสารขาย</h2>
                            <p className="text-emerald-100 text-sm">สร้างใบเสนอราคา ใบแจ้งหนี้ และรับชำระเงินได้อย่างรวดเร็ว</p>
                        </div>
                    </div>

                    <div className="bg-white rounded-lg shadow-sm border border-slate-200 p-4 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                        <div className="flex items-center space-x-3 w-full sm:w-auto">
                            <span className="font-medium text-slate-700">เลือกเดือน:</span>
                            <input type="month" value={selectedMonth} onChange={e => setSelectedMonth(e.target.value)} className="p-2 border border-slate-300 rounded-md text-sm outline-none focus:ring-2 focus:ring-emerald-400 w-full sm:w-auto" />
                        </div>
                    </div>

                    <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-4 sm:gap-6">
                        <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-5 flex items-center">
                            <div className="w-12 h-12 rounded-full bg-green-100 text-green-600 flex items-center justify-center mr-4 shrink-0"><i className="fas fa-coins text-xl"></i></div>
                            <div><p className="text-xs sm:text-sm text-slate-500 font-medium mb-1">รายได้รวม (ใบเสร็จ)</p><p className="text-xl sm:text-2xl font-bold text-slate-800">฿{formatNum(stats.totalSales)}</p></div>
                        </div>
                        <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-5 flex items-center">
                            <div className="w-12 h-12 rounded-full bg-emerald-100 text-emerald-600 flex items-center justify-center mr-4 shrink-0"><i className="fas fa-check-circle text-xl"></i></div>
                            <div><p className="text-xs sm:text-sm text-slate-500 font-medium mb-1">จำนวนใบเสร็จ</p><p className="text-xl sm:text-2xl font-bold text-slate-800">{stats.receiptsCount} รายการ</p></div>
                        </div>
                        <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-5 flex items-center">
                            <div className="w-12 h-12 rounded-full bg-orange-100 text-orange-600 flex items-center justify-center mr-4 shrink-0"><i className="fas fa-clock text-xl"></i></div>
                            <div><p className="text-xs sm:text-sm text-slate-500 font-medium mb-1">รอรับชำระ (บิล)</p><p className="text-xl sm:text-2xl font-bold text-slate-800">฿{formatNum(stats.pendingAmount)}</p></div>
                        </div>
                        <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-5 flex items-center">
                            <div className="w-12 h-12 rounded-full bg-teal-100 text-teal-600 flex items-center justify-center mr-4 shrink-0"><i className="fas fa-file-alt text-xl"></i></div>
                            <div><p className="text-xs sm:text-sm text-slate-500 font-medium mb-1">จำนวนใบแจ้งหนี้</p><p className="text-xl sm:text-2xl font-bold text-slate-800">{stats.invoicesCount} รายการ</p></div>
                        </div>
                    </div>

                    <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                        <div className="p-4 border-b border-slate-200 bg-slate-50"><h3 className="font-bold text-slate-800">รายการยอดขายเดือนนี้ (ใบเสร็จ)</h3></div>
                        <div className="overflow-x-auto">
                            <table className="w-full text-left min-w-[600px] text-sm">
                                <thead className="bg-slate-50 border-b border-slate-200 text-slate-600">
                                    <tr><th className="p-4 font-medium">วันที่</th><th className="p-4 font-medium">เลขที่เอกสาร</th><th className="p-4 font-medium">ลูกค้า</th><th className="p-4 font-medium text-right">ยอดรวมสุทธิ</th></tr>
                                </thead>
                                <tbody>
                                    {stats.salesData.length === 0 ? (
                                        <tr><td colSpan="4" className="p-8 text-center text-slate-500">ไม่มีข้อมูลยอดขายในเดือนนี้</td></tr>
                                    ) : stats.salesData.map(doc => (
                                        <tr key={doc.id} className="border-b border-slate-100 hover:bg-slate-50">
                                            <td className="p-4 text-slate-600">{formatDate(doc.date)}</td>
                                            <td className="p-4 font-semibold text-emerald-600">{doc.id}</td>
                                            <td className="p-4 font-medium text-slate-800">{(customers.find(c => c.id === doc.customerId)||{}).name || '-'}</td>
                                            <td className="p-4 font-bold text-emerald-600 text-right">฿{formatNum(doc.grandTotal)}</td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        }

        function DocumentsView({ documents, customers, products, onPrint }) {
            const [filter, setFilter] = useState('ALL');
            const [isFormOpen, setIsFormOpen] = useState(false);
            const [editingDoc, setEditingDoc] = useState(null);
            const [formType, setFormType] = useState('QT');

            const filteredDocs = useMemo(() => documents.filter(d => filter === 'ALL' || d.type === filter), [documents, filter]);

            const getBadge = (status) => {
                const sMap = { 'Pending': 'bg-amber-100 text-amber-700 border-amber-200', 'Invoiced': 'bg-teal-100 text-teal-700 border-teal-200', 'Unpaid': 'bg-orange-100 text-orange-700 border-orange-200', 'Paid': 'bg-emerald-100 text-emerald-700 border-emerald-200' };
                const tMap = { 'Pending': 'รอดำเนินการ', 'Invoiced': 'ออกบิลแล้ว', 'Unpaid': 'รอชำระเงิน', 'Paid': 'ชำระแล้ว' };
                return <span className={`px-2 py-1 text-[11px] font-bold rounded border ${sMap[status]||'bg-slate-100'}`}>{tMap[status]||status}</span>;
            };

            const handleNew = (type) => { setFormType(type); setEditingDoc(null); setIsFormOpen(true); };
            const handleEdit = (docData) => { setFormType(docData.type); setEditingDoc(docData); setIsFormOpen(true); };
            const handleConvert = (docData, newType) => {
                const conv = { ...docData, type: newType, refId: docData.id, status: newType === 'IV' ? 'Unpaid' : 'Paid', date: new Date().toISOString().split('T')[0] };
                setFormType(newType); setEditingDoc(conv); setIsFormOpen(true);
            };

            if (isFormOpen) {
                return <DocumentForm type={formType} initialData={editingDoc} customers={customers} products={products} onClose={() => setIsFormOpen(false)} onPrint={onPrint} />;
            }

            return (
                <div className="space-y-4">
                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                        <div className="flex space-x-1 sm:space-x-2 bg-white p-1 rounded-lg shadow-sm border border-slate-200 w-full overflow-x-auto">
                            {['ALL', 'QT', 'IV', 'RE'].map(t => (
                                <button key={t} onClick={() => setFilter(t)} className={`flex-1 px-4 py-2 rounded-md text-sm font-semibold whitespace-nowrap transition-colors ${filter === t ? 'bg-slate-800 text-white shadow' : 'text-slate-600 hover:bg-slate-100'}`}>
                                    {t === 'ALL' ? 'ทั้งหมด' : t === 'QT' ? 'ใบเสนอราคา' : t === 'IV' ? 'ใบแจ้งหนี้' : 'ใบเสร็จ'}
                                </button>
                            ))}
                        </div>
                        <div className="flex space-x-2 w-full md:w-auto">
                            <button onClick={() => handleNew('QT')} className="flex-1 md:flex-none justify-center flex items-center px-4 py-2 bg-emerald-600 text-white rounded-lg hover:bg-emerald-700 text-sm font-bold shadow-sm transition"><i className="fas fa-plus mr-2"></i> สร้าง QT</button>
                            <button onClick={() => handleNew('IV')} className="flex-1 md:flex-none justify-center flex items-center px-4 py-2 bg-teal-600 text-white rounded-lg hover:bg-teal-700 text-sm font-bold shadow-sm transition"><i className="fas fa-plus mr-2"></i> สร้าง IV</button>
                        </div>
                    </div>

                    <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                        <div className="overflow-x-auto">
                            <table className="w-full text-left min-w-[800px] text-sm">
                                <thead className="bg-slate-50 border-b border-slate-200 text-slate-600">
                                    <tr><th className="p-4 font-medium">เลขที่เอกสาร</th><th className="p-4 font-medium">ลูกค้า</th><th className="p-4 font-medium">วันที่ / ครบกำหนด</th><th className="p-4 font-medium text-right">ยอดสุทธิ</th><th className="p-4 font-medium text-center">สถานะ</th><th className="p-4 font-medium text-center">จัดการ</th></tr>
                                </thead>
                                <tbody>
                                    {filteredDocs.length === 0 ? <tr><td colSpan="6" className="p-8 text-center text-slate-500">ไม่มีเอกสาร</td></tr> : filteredDocs.map(doc => (
                                        <tr key={doc.id} className="border-b border-slate-100 hover:bg-slate-50">
                                            <td className="p-4"><div className="font-bold text-emerald-600">{doc.id}</div>{doc.refId && <div className="text-[11px] text-slate-400">อ้างอิง: {doc.refId}</div>}</td>
                                            <td className="p-4 font-medium text-slate-800">{(customers.find(c => c.id === doc.customerId)||{}).name || 'ไม่ระบุ'}</td>
                                            <td className="p-4 text-slate-600">{formatDate(doc.date)} {doc.dueDate && <div className="text-xs text-slate-400">Due: {formatDate(doc.dueDate)}</div>}</td>
                                            <td className="p-4 font-bold text-slate-800 text-right">฿{formatNum(doc.grandTotal)}</td>
                                            <td className="p-4 text-center">{getBadge(doc.status)}</td>
                                            <td className="p-4 flex items-center justify-center space-x-1.5">
                                                <button onClick={() => onPrint(doc)} title="พิมพ์" className="p-1.5 px-2 text-slate-500 hover:text-emerald-600 bg-slate-100 hover:bg-emerald-50 rounded transition"><i className="fas fa-print"></i></button>
                                                <button onClick={() => handleEdit(doc)} title="แก้ไข" className="p-1.5 px-2 text-slate-500 hover:text-amber-600 bg-slate-100 hover:bg-amber-50 rounded transition"><i className="fas fa-edit"></i></button>
                                                {doc.type === 'QT' && doc.status !== 'Invoiced' && <button onClick={() => handleConvert(doc, 'IV')} title="แปลงเป็นใบแจ้งหนี้" className="p-1.5 px-2 text-slate-500 hover:text-teal-600 bg-slate-100 hover:bg-teal-50 rounded text-xs font-bold transition flex items-center"><i className="fas fa-arrow-right mr-1"></i> IV</button>}
                                                {doc.type === 'IV' && doc.status !== 'Paid' && <button onClick={() => handleConvert(doc, 'RE')} title="รับชำระ" className="p-1.5 px-2 text-white bg-emerald-500 hover:bg-emerald-600 rounded text-xs font-bold shadow-sm transition flex items-center"><i className="fas fa-dollar-sign mr-1"></i> จ่าย</button>}
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        }

        function DocumentForm({ type, initialData, customers, products, onClose, onPrint }) {
            const isViewOnly = initialData?._isViewOnly || false;
            const isEditMode = !!initialData && !isViewOnly && !initialData.refId; 
            
            const [showCustModal, setShowCustModal] = useState(false);

            const generateId = (t) => {
                const d = new Date().toISOString().slice(2, 7).replace(/-/g, '');
                return `${t}-${d}${Math.floor(Math.random() * 1000).toString().padStart(3, '0')}`;
            };

            const [docData, setDocData] = useState(initialData || {
                id: generateId(type), type: type, status: type === 'QT' ? 'Pending' : type === 'IV' ? 'Unpaid' : 'Paid',
                customerId: '', date: new Date().toISOString().split('T')[0], dueDate: '',
                items: [{ productId: '', name: '', qty: 1, price: 0 }], discount: 0, hasVat: true, hasWht: false, whtRate: 3, notes: ''
            });

            const totals = useMemo(() => {
                let subtotal = docData.items.reduce((s, i) => s + (Number(i.qty) * Number(i.price)), 0);
                const discount = Number(docData.discount) || 0;
                const afterDis = subtotal - discount;
                const vat = docData.hasVat ? afterDis * 0.07 : 0;
                const wht = docData.hasWht ? afterDis * (docData.whtRate / 100) : 0;
                return { subtotal, discount, vatAmount: vat, whtAmount: wht, grandTotal: afterDis + vat - wht };
            }, [docData.items, docData.discount, docData.hasVat, docData.hasWht, docData.whtRate]);

            const handleItemChange = (idx, field, val) => {
                const newItems = [...docData.items];
                newItems[idx][field] = val;
                if (field === 'productId') {
                    const p = products.find(x => x.id === val);
                    if (p) { newItems[idx].name = p.name; newItems[idx].price = p.price; }
                }
                setDocData({ ...docData, items: newItems });
            };

            const saveToDb = async (e) => {
                e.preventDefault();
                if (!docData.customerId) return Swal.fire('แจ้งเตือน', 'กรุณาเลือกลูกค้า', 'warning');
                if (docData.items.length === 0) return Swal.fire('แจ้งเตือน', 'กรุณาเพิ่มรายการสินค้า', 'warning');

                const finalDoc = {
                    ...docData,
                    items: docData.items.map(i => ({ productId: i.productId||'', name: i.name, qty: Number(i.qty), price: Number(i.price) })),
                    ...totals
                };
                delete finalDoc._isViewOnly;

                try {
                    Swal.fire({ title: 'กำลังบันทึก...', didOpen: () => Swal.showLoading(), allowOutsideClick: false });
                    await setDoc(doc(db, publicPath, 'documents', finalDoc.id), finalDoc);
                    
                    if (finalDoc.refId) {
                        if(finalDoc.type === 'IV') await setDoc(doc(db, publicPath, 'documents', finalDoc.refId), { status: 'Invoiced' }, {merge: true});
                        if(finalDoc.type === 'RE') await setDoc(doc(db, publicPath, 'documents', finalDoc.refId), { status: 'Paid' }, {merge: true});
                    }
                    
                    Swal.fire({ title: 'สำเร็จ', icon: 'success', timer: 1000, showConfirmButton: false });
                    onClose(); // ทริกเกอร์ให้ React ซ่อน Component นี้
                } catch (err) {
                    Swal.fire('ข้อผิดพลาด', 'บันทึกไม่สำเร็จ', 'error');
                }
            };

            return (
                <div className="bg-white rounded-xl shadow-sm border border-slate-200 relative">
                    <div className="px-5 py-4 border-b border-slate-200 flex justify-between items-center bg-slate-50 rounded-t-xl">
                        <h2 className="text-lg font-bold text-slate-800">{isViewOnly ? 'รายละเอียดเอกสาร' : isEditMode ? 'แก้ไขเอกสาร' : 'สร้างเอกสารใหม่'} <span className="text-emerald-600 ml-1">({docData.id})</span></h2>
                        <button type="button" onClick={onClose} className="text-slate-400 hover:text-red-500 p-1 transition"><i className="fas fa-times text-xl"></i></button>
                    </div>
                    <form onSubmit={saveToDb} className="p-4 sm:p-6">
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4 sm:gap-6 mb-6">
                            <div className="md:col-span-1">
                                <label className="block text-sm font-semibold mb-1 text-slate-700">ลูกค้า</label>
                                <div className="flex gap-2">
                                    <select value={docData.customerId} onChange={e => setDocData({...docData, customerId: e.target.value})} disabled={isViewOnly} className="w-full p-2.5 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-emerald-400 disabled:bg-slate-100" required>
                                        <option value="" disabled>-- เลือกลูกค้า --</option>
                                        {customers.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
                                    </select>
                                    {!isViewOnly && <button type="button" onClick={() => setShowCustModal(true)} className="bg-emerald-50 text-emerald-600 px-4 py-2 rounded-lg border border-emerald-200 hover:bg-emerald-100 transition shrink-0"><i className="fas fa-plus"></i></button>}
                                </div>
                            </div>
                            <div>
                                <label className="block text-sm font-semibold mb-1 text-slate-700">วันที่ออกเอกสาร</label>
                                <input type="date" value={docData.date} onChange={e => setDocData({...docData, date: e.target.value})} disabled={isViewOnly} className="w-full p-2.5 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-emerald-400 disabled:bg-slate-100" required />
                            </div>
                            <div>
                                <label className="block text-sm font-semibold mb-1 text-slate-700">วันครบกำหนด</label>
                                <input type="date" value={docData.dueDate || ''} onChange={e => setDocData({...docData, dueDate: e.target.value})} disabled={isViewOnly} className="w-full p-2.5 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-emerald-400 disabled:bg-slate-100" />
                            </div>
                        </div>

                        <div className="border border-slate-200 rounded-xl overflow-hidden mb-6">
                            <div className="overflow-x-auto">
                                <table className="w-full text-left text-sm min-w-[700px]">
                                    <thead className="bg-slate-50 border-b border-slate-200 text-slate-600">
                                    <tr><th className="p-3 w-10 text-center">#</th><th className="p-3 w-1/4">เลือกจากระบบ</th><th className="p-3 w-1/3">ชื่อรายการ (พิมพ์ได้)</th><th className="p-3 w-20 text-right">จำนวน</th><th className="p-3 w-28 text-right">ราคา</th><th className="p-3 w-28 text-right">รวม</th>{!isViewOnly && <th className="p-3 w-12 text-center"></th>}</tr>
                                    </thead>
                                    <tbody>
                                    {docData.items.map((item, idx) => (
                                        <tr key={idx} className="border-b border-slate-100">
                                            <td className="p-3 text-center text-slate-500">{idx+1}</td>
                                            <td className="p-2"><select value={item.productId} onChange={e => handleItemChange(idx, 'productId', e.target.value)} disabled={isViewOnly} className="w-full p-2 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-emerald-300 disabled:bg-slate-100"><option value="">- พิมพ์เอง -</option>{products.map(p => <option key={p.id} value={p.id}>{p.code} - {p.name}</option>)}</select></td>
                                            <td className="p-2"><input type="text" value={item.name} onChange={e => handleItemChange(idx, 'name', e.target.value)} disabled={isViewOnly} className="w-full p-2 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-emerald-300 disabled:bg-slate-100" required /></td>
                                            <td className="p-2"><input type="number" min="1" value={item.qty} onChange={e => handleItemChange(idx, 'qty', e.target.value)} disabled={isViewOnly} className="w-full p-2 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-emerald-300 text-right disabled:bg-slate-100" required /></td>
                                            <td className="p-2"><input type="number" min="0" value={item.price} onChange={e => handleItemChange(idx, 'price', e.target.value)} disabled={isViewOnly} className="w-full p-2 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-emerald-300 text-right disabled:bg-slate-100" required /></td>
                                            <td className="p-3 text-right font-bold text-slate-700">฿{formatNum(item.qty * item.price)}</td>
                                            {!isViewOnly && <td className="p-2 text-center"><button type="button" onClick={() => setDocData({...docData, items: docData.items.filter((_,i)=>i!==idx)})} className="text-red-400 hover:text-red-600 transition p-2"><i className="fas fa-trash"></i></button></td>}
                                        </tr>
                                    ))}
                                    </tbody>
                                </table>
                            </div>
                            {!isViewOnly && <div className="p-3 bg-slate-50 border-t border-slate-200"><button type="button" onClick={() => setDocData({...docData, items: [...docData.items, {productId:'', name:'', qty:1, price:0}]})} className="text-sm font-bold text-emerald-600 hover:text-emerald-800 transition flex items-center p-1"><i className="fas fa-plus mr-1"></i> เพิ่มรายการสินค้า</button></div>}
                        </div>

                        <div className="flex flex-col md:flex-row gap-6 sm:gap-8">
                            <div className="w-full md:w-1/2 order-2 md:order-1">
                                <label className="block text-sm font-semibold mb-1 text-slate-700">หมายเหตุ</label>
                                <textarea value={docData.notes} onChange={e => setDocData({...docData, notes: e.target.value})} disabled={isViewOnly} className="w-full p-3 border border-slate-300 rounded-xl h-28 outline-none focus:ring-2 focus:ring-emerald-400 disabled:bg-slate-100" />
                            </div>
                            <div className="w-full md:w-1/2 bg-slate-50 p-4 sm:p-5 rounded-xl border border-slate-200 space-y-3 shadow-inner order-1 md:order-2">
                                <div className="flex justify-between text-sm"><span className="text-slate-600 font-medium">รวมเป็นเงิน</span><span className="font-bold">฿{formatNum(totals.subtotal)}</span></div>
                                <div className="flex justify-between items-center text-sm">
                                    <span className="text-slate-600 font-medium">ส่วนลด</span>
                                    <input type="number" value={docData.discount} onChange={e => setDocData({...docData, discount: e.target.value})} disabled={isViewOnly} className="w-24 p-2 border border-slate-300 rounded-md text-right outline-none focus:ring-2 focus:ring-emerald-400 disabled:bg-slate-100" />
                                </div>
                                <div className="flex justify-between items-center text-sm">
                                    <label className="flex items-center text-slate-600 font-medium"><input type="checkbox" checked={docData.hasVat} onChange={e => setDocData({...docData, hasVat: e.target.checked})} disabled={isViewOnly} className="mr-2 w-4 h-4 accent-emerald-500" /> ภาษี 7%</label>
                                    <span className="font-bold">฿{formatNum(totals.vatAmount)}</span>
                                </div>
                                <div className="flex justify-between items-center text-sm">
                                    <label className="flex items-center text-slate-600 font-medium"><input type="checkbox" checked={docData.hasWht} onChange={e => setDocData({...docData, hasWht: e.target.checked})} disabled={isViewOnly} className="mr-2 w-4 h-4 accent-emerald-500" /> หัก ณ ที่จ่าย 
                                        <select value={docData.whtRate} onChange={e => setDocData({...docData, whtRate: e.target.value})} disabled={isViewOnly} className="ml-2 p-1.5 border border-slate-300 rounded-md text-xs outline-none focus:ring-1 focus:ring-emerald-400 disabled:bg-slate-100"><option value="1">1%</option><option value="3">3%</option><option value="5">5%</option></select>
                                    </label>
                                    <span className="font-bold text-red-600">- ฿{formatNum(totals.whtAmount)}</span>
                                </div>
                                <div className="pt-4 border-t border-slate-300 flex justify-between items-center mt-2">
                                    <span className="text-base font-bold text-slate-800">ยอดชำระสุทธิ</span>
                                    <span className="text-xl sm:text-2xl font-black text-emerald-600">฿{formatNum(totals.grandTotal)}</span>
                                </div>
                            </div>
                        </div>

                        <div className="mt-6 sm:mt-8 flex flex-col sm:flex-row justify-end sm:space-x-3 border-t border-slate-200 pt-6 gap-3 sm:gap-0">
                            <button type="button" onClick={onClose} className="w-full sm:w-auto px-6 py-3 sm:py-2.5 border border-slate-300 rounded-lg text-slate-600 hover:bg-slate-50 font-medium transition text-center order-3 sm:order-1">ยกเลิก/ปิด</button>
                            {(isEditMode || isViewOnly) && <button type="button" onClick={() => onPrint({...docData, ...totals})} className="w-full sm:w-auto px-6 py-3 sm:py-2.5 bg-blue-600 text-white rounded-lg font-bold hover:bg-blue-700 shadow-md transition flex items-center justify-center order-2 sm:order-2"><i className="fas fa-print mr-2"></i> พิมพ์ / PDF</button>}
                            {!isViewOnly && <button type="submit" className="w-full sm:w-auto px-6 py-3 sm:py-2.5 bg-emerald-600 text-white rounded-lg font-bold hover:bg-emerald-700 shadow-md transition flex items-center justify-center order-1 sm:order-3"><i className="fas fa-check-circle mr-2"></i> บันทึกข้อมูล</button>}
                        </div>
                    </form>

                    {showCustModal && <CustomerModal onClose={() => setShowCustModal(false)} onSaved={(id) => setDocData({...docData, customerId: id})} />}
                </div>
            );
        }

        function OldDocumentsView({ documents, customers, onPrint }) {

        function SettingsView({ company }) {
            const [localComp, setLocalComp] = useState({ ...company });

                e.preventDefault();

            };

            const handleLogo = (e) => {
                const file = e.target.files[0]; if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const img = new Image(); img.onload = () => {
                        const canvas = document.createElement('canvas'); const maxW = 400; let scale = maxW / img.width; if(scale > 1) scale = 1;
                        canvas.width = img.width * scale; canvas.height = img.height * scale; canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                        setLocalComp({...localComp, logo: canvas.toDataURL('image/png', 0.8)});
                    }; img.src = ev.target.result;
                }; reader.readAsDataURL(file);
            };

            return (
                <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 sm:p-8 max-w-2xl mx-auto md:mx-0">

                        <div className="px-5 sm:px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-slate-50 shrink-0 sticky top-0 z-10"><h3 className="font-bold text-lg text-emerald-800">เพิ่มพนักงาน</h3><button onClick={onClose} className="text-slate-400 hover:text-red-500 transition p-1"><i className="fas fa-times text-xl"></i></button></div>
                        <form onSubmit={saveEmp} className="p-5 sm:p-6 space-y-4">
                            <div><label className="block text-sm font-medium mb-1 text-slate-700">ชื่อ-นามสกุล</label><input type="text" value={form.name} onChange={e=>setForm({...form, name: e.target.value})} className="w-full p-2.5 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-emerald-400" required /></div>
                            <div><label className="block text-sm font-medium mb-1 text-slate-700">อีเมล / Username</label><input type="email" value={form.email} onChange={e=>setForm({...form, email: e.target.value})} className="w-full p-2.5 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-emerald-400" required /></div>
                            <div><label className="block text-sm font-medium mb-1 text-slate-700">รหัสผ่าน (ขั้นต่ำ 4 ตัว)</label><input type="password" minLength="4" value={form.password} onChange={e=>setForm({...form, password: e.target.value})} className="w-full p-2.5 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-emerald-400" required /></div>
                            <div><label className="block text-sm font-medium mb-1 text-slate-700">ระดับสิทธิ์</label><select value={form.role} onChange={e=>setForm({...form, role: e.target.value})} className="w-full p-2.5 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-emerald-400"><option value="employee">พนักงานทั่วไป</option><option value="admin">ผู้ดูแลระบบ (Admin)</option></select></div>
                            <div className="flex justify-end gap-3 mt-4 pt-4 border-t border-slate-100"><button type="button" onClick={onClose} className="px-5 py-2.5 border border-slate-300 rounded-lg text-slate-600 font-medium hover:bg-slate-50">ยกเลิก</button><button type="submit" className="px-5 py-2.5 bg-emerald-600 text-white rounded-lg font-bold shadow-md hover:bg-emerald-700">บันทึก</button></div>
                        </form>
                    </div>
                </div>
            );
        }

        // --- PRINT VIEW ---
        function PrintView({ doc: data, company, customer, onClose }) {
            useEffect(() => { setTimeout(()=>window.print(), 500); }, []);
            const docTitleMap = { 'QT': 'ใบเสนอราคา', 'IV': 'ใบส่งของ / ใบกำกับภาษี', 'RE': 'ใบเสร็จรับเงิน' };

            return (
                <div className="fixed inset-0 bg-slate-800/95 z-50 flex-col overflow-hidden py-4 px-2 sm:py-8 sm:px-4 flex">
                    <div className="no-print bg-white p-3 sm:p-4 rounded-xl shadow-lg flex justify-center gap-3 mb-4 shrink-0 w-full max-w-sm mx-auto border border-slate-200">
                        <button onClick={() => window.print()} className="px-4 py-2 sm:py-2.5 bg-blue-600 hover:bg-blue-700 text-white rounded-lg flex-1 transition shadow-sm font-bold text-sm sm:text-base"><i className="fas fa-print mr-2"></i> พิมพ์ / PDF</button>
                        <button onClick={onClose} className="px-4 py-2 sm:py-2.5 bg-slate-100 hover:bg-slate-200 text-slate-800 rounded-lg flex items-center justify-center transition shadow-sm font-bold text-sm sm:text-base"><i className="fas fa-times mr-2"></i> ปิดหน้าต่าง</button>
                    </div>

                    <div className="flex-1 overflow-auto w-full flex justify-center pb-12">
                        <div className="bg-white text-slate-800 box-border flex flex-col justify-between shadow-2xl shrink-0 print:shadow-none print:m-0 overflow-hidden origin-top scale-[0.45] md:scale-100" style={{width: '210mm', height: '297mm', padding: '15mm', margin: '0 auto'}}>
                            <div>
                                <div className="flex justify-between items-start border-b-2 border-slate-800 pb-3 mb-3 shrink-0">
                                    <div className="flex items-start gap-4">
                                        {company.logo ? <img src={company.logo} className="h-14 max-w-[160px] object-contain shrink-0"/> : <div className="w-14 h-14 bg-emerald-600 text-white flex items-center justify-center font-bold rounded shrink-0">LOGO</div>}
                                        <div className="max-w-[300px]">
                                            <h1 className="text-lg font-bold text-emerald-900 leading-tight mb-1">{company.name}</h1>
                                            <p className="text-[11px] whitespace-pre-wrap leading-tight mb-0.5">{company.address}</p>
                                            <p className="text-[11px] mb-0.5">เลขประจำตัวผู้เสียภาษี: {company.taxId}</p>
                                            <p className="text-[11px]">โทร: {company.phone} | อีเมล: {company.email}</p>
                                        </div>
                                    </div>
                                    <div className="text-right shrink-0 ml-4">
                                        <h2 className="text-xl font-bold mb-2">{docTitleMap[data.type]}</h2>
                                        <div className="grid grid-cols-2 gap-x-3 gap-y-1 text-sm bg-slate-50 p-2 rounded border text-left min-w-[160px]">
                                            <span className="font-semibold">เลขที่:</span><span className="font-bold">{data.id}</span>
                                            <span className="font-semibold">วันที่:</span><span>{formatDate(data.date)}</span>
                                            {data.refId && <><span className="font-semibold">อ้างอิง:</span><span>{data.refId}</span></>}
                                        </div>
                                    </div>
                                </div>

                                <div className="flex justify-between mb-4 shrink-0 gap-4">
                                    <div className="flex-1 border p-2.5 rounded min-h-[80px]">
                                        <h3 className="text-[11px] font-bold text-slate-500 border-b pb-1 mb-1">ลูกค้า (Customer)</h3>
                                        <p className="font-bold text-sm">{customer.name || 'ไม่ระบุชื่อ'}</p>
                                        <p className="text-xs mt-1">{customer.address}</p>
                                        <p className="text-[11px] mt-1">เลขประจำตัวผู้เสียภาษี: {customer.taxId}</p>
                                        <p className="text-[11px] mt-1">โทร: {customer.phone || '-'} | อีเมล: {customer.email || '-'}</p>
                                    </div>
                                    <div className="w-[30%] border p-2.5 rounded min-h-[80px] flex flex-col justify-center text-sm">
                                        <div className="flex justify-between mb-1"><span className="text-[11px] text-slate-500">เงื่อนไขชำระ:</span><span className="font-medium text-[11px]">30 วัน</span></div>
                                        <div className="flex justify-between"><span className="text-[11px] text-slate-500">วันครบกำหนด:</span><span className="font-medium text-[11px]">{formatDate(data.dueDate) || '-'}</span></div>
                                    </div>
                                </div>

                                <table className="w-full text-sm border-collapse mb-4">
                                    <thead>
                                        <tr className="bg-slate-100 border-y-2 border-slate-400">
                                            <th className="py-1.5 px-2 text-center w-12 border-r border-white">ลำดับ</th>
                                            <th className="py-1.5 px-2 text-left border-r border-white">รายละเอียดสินค้า/บริการ</th>
                                            <th className="py-1.5 px-2 text-right w-20 border-r border-white">จำนวน</th>
                                            <th className="py-1.5 px-2 text-right w-24 border-r border-white">ราคา/หน่วย</th>
                                            <th className="py-1.5 px-2 text-right w-28">จำนวนเงิน</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {data.items.map((item, idx) => (
                                            <tr key={idx} className="border-b border-slate-200">
                                                <td className="py-1.5 px-2 text-center border-r border-white">{idx+1}</td>
                                                <td className="py-1.5 px-2 font-medium border-r border-white">{item.name}</td>
                                                <td className="py-1.5 px-2 text-right border-r border-white">{item.qty}</td>
                                                <td className="py-1.5 px-2 text-right border-r border-white">{formatNum(item.price)}</td>
                                                <td className="py-1.5 px-2 text-right font-bold">{formatNum(item.qty * item.price)}</td>
                                            </tr>
                                        ))}
                                        {[...Array(Math.max(0, 6 - data.items.length))].map((_, i) => <tr key={`f-${i}`}><td colSpan="5" className="py-3 border-b border-slate-50"></td></tr>)}
                                    </tbody>
                                </table>
                            </div>

                            <div>
                                <div className="flex justify-between shrink-0 border-t border-slate-300 pt-3 mt-4 gap-4">
                                    <div className="w-[55%]">
                                        <div className="border p-2 rounded min-h-[60px] text-xs text-slate-700 mb-2">
                                            <span className="font-bold text-slate-500 border-b pb-1 block mb-1">หมายเหตุ:</span>
                                            <span className="whitespace-pre-wrap leading-tight block">{data.notes || '-'}</span>
                                        </div>
                                        {data.type === 'RE' && <div className="text-sm bg-green-50 text-green-800 p-1.5 border border-green-200 rounded flex items-center justify-center font-bold mt-2"><i className="fas fa-check-circle mr-2 text-lg"></i>ชำระเงินเรียบร้อยแล้ว</div>}
                                    </div>
                                    <div className="w-[45%]">
                                        <table className="w-full text-sm">
                                            <tbody>
                                                <tr><td className="py-1">รวมเป็นเงิน</td><td className="py-1 text-right">฿{formatNum(data.subtotal)}</td></tr>
                                                {data.discount > 0 && <tr><td className="py-1">หักส่วนลด</td><td className="py-1 text-right text-red-600">- ฿{formatNum(data.discount)}</td></tr>}
                                                {data.hasVat && <tr><td className="py-1">ภาษีมูลค่าเพิ่ม 7%</td><td className="py-1 text-right">฿{formatNum(data.vatAmount)}</td></tr>}
                                                {data.hasWht && <tr><td className="py-1">หัก ณ ที่จ่าย {data.whtRate}%</td><td className="py-1 text-right text-red-600">- ฿{formatNum(data.whtAmount)}</td></tr>}
                                                <tr className="border-t-2 border-slate-800 font-bold text-base"><td className="py-2">ยอดเงินสุทธิ</td><td className="py-2 text-right">฿{formatNum(data.grandTotal)}</td></tr>
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                                <div className="grid grid-cols-2 gap-6 text-center text-[12px] border-t-2 border-slate-400 pt-6 mt-6 relative">
                                    <div>
                                        <div className="border-b border-slate-400 w-40 mx-auto mb-1 h-12"></div>
                                        <p className="font-medium">ผู้รับเอกสาร</p>
                                        <p className="text-[10px] text-slate-500 mt-1">วันที่ _______/_______/_______</p>
                                    </div>
                                    <div className="relative">
                                        <div className="border-b border-slate-400 w-40 mx-auto mb-1 h-12 flex items-end justify-center">
                                            <span className="text-emerald-800 font-serif italic text-lg border-2 border-emerald-500 rounded-full px-3 py-0.5 rotate-[15deg] opacity-70 absolute top-[-15px] bg-white">Approved</span>
                                        </div>
                                        <p className="font-medium">ผู้อนุมัติ / ผู้รับมอบอำนาจ</p>
                                        <p className="text-[10px] text-slate-500 mt-1">วันที่ {formatDate(data.date)}</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // ==========================================
        // RENDER
        // ==========================================
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
